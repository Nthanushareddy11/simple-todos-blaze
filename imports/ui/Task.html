<template name="task">
  <li class="{{checkedClass}}" data-id="{{_id}}">
    <span class="drag-handle" title="Drag to reorder">⠿</span>
    <input type="checkbox" checked="{{isChecked}}" class="toggle-checked" />

    {{#if isEditing}}
      <input type="text" class="task-text-edit" value="{{text}}" />
    {{else}}
      <span class="task-text" title="Click to edit">{{text}}</span>
    {{/if}}

    <input
      type="date"
      class="task-due-date {{overdueClass}}"
      value="{{dueDateValue}}"
      title="Due date"
    />

    <select class="task-category-select category-{{category}}">
      <option value="Work" selected="{{isCategory 'Work'}}">Work</option>
      <option value="Personal" selected="{{isCategory 'Personal'}}">Personal</option>
      <option value="Urgent" selected="{{isCategory 'Urgent'}}">Urgent</option>
    </select>
    <button type="button" class="delete">&times;</button>
  </li>
</template>
